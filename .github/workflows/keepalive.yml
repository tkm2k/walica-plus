# Supabase無料プランの「1週間非アクティブで一時停止」を防ぐための定期ping
# 週2回（月・木 UTC 0時 = 日本時間9時）、DBに軽いクエリを投げてアクティブ状態を維持する
name: Supabase Keepalive

on:
  schedule:
    - cron: "0 0 * * 1,4"
  workflow_dispatch: {}  # 手動実行も可能（Actionsタブから）

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /tmp/res.txt -w "%{http_code}" -X POST \
            "https://kmzatbbxemsptekdkhtw.supabase.co/rest/v1/rpc/get_event" \
            -H "apikey: sb_publishable_U78MtNpJfQJ3fmElonM5XA_-zqOUu5Y" \
            -H "Content-Type: application/json" \
            -d '{"p_event_id":"00000000-0000-0000-0000-000000000000"}')
          echo "HTTP $STATUS / body: $(cat /tmp/res.txt)"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Supabase ping failed (HTTP $STATUS) - プロジェクトが停止している可能性があります"
            exit 1
          fi
